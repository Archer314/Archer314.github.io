<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026新年快乐</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a1a;
            --bg-mid: #0f1428;
            --accent-gold: #ffd700;
            --accent-warm: #ff6b4a;
            --text-light: #f0e6d3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(180deg, var(--bg-dark) 0%, var(--bg-mid) 50%, #1a1a2e 100%);
            min-height: 100vh;
            overflow: hidden;
            color: var(--text-light);
        }

        #canvas-fireworks {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        #canvas-stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .city-silhouette {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 180px;
            z-index: 5;
            pointer-events: none;
        }

        .content {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 20;
            pointer-events: none;
        }

        .year-text {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: clamp(80px, 20vw, 200px);
            font-weight: 400;
            background: linear-gradient(135deg, var(--accent-gold) 0%, #fff8dc 40%, var(--accent-warm) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 60px rgba(255, 215, 0, 0.3);
            animation: textGlow 3s ease-in-out infinite;
            letter-spacing: 0.05em;
        }

        .greeting-text {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: clamp(32px, 8vw, 72px);
            color: var(--text-light);
            margin-top: 10px;
            letter-spacing: 0.2em;
            opacity: 0.9;
            animation: fadeInUp 1.5s ease-out 0.5s both;
        }

        .hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: rgba(240, 230, 211, 0.5);
            z-index: 30;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes textGlow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.2); }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 0.9;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }

        @media (prefers-reduced-motion: reduce) {
            .year-text, .greeting-text, .hint {
                animation: none;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas-stars"></canvas>
    <canvas id="canvas-fireworks"></canvas>
    
    <svg class="city-silhouette" viewBox="0 0 1440 180" preserveAspectRatio="none">
        <defs>
            <linearGradient id="cityGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#1a1a2e"/>
                <stop offset="100%" style="stop-color:#0f0f1a"/>
            </linearGradient>
        </defs>
        <path fill="url(#cityGrad)" d="M0,180 L0,120 L40,120 L40,100 L60,100 L60,80 L80,80 L80,100 L120,100 L120,60 L140,60 L140,100 L180,100 L180,80 L200,80 L200,120 L240,120 L240,90 L260,90 L260,70 L280,70 L280,90 L320,90 L320,50 L340,40 L360,50 L360,90 L400,90 L400,120 L440,120 L440,70 L460,70 L460,50 L480,50 L480,70 L520,70 L520,100 L560,100 L560,60 L580,60 L580,40 L600,40 L600,60 L640,60 L640,110 L680,110 L680,80 L720,80 L720,45 L740,35 L760,45 L760,80 L800,80 L800,120 L840,120 L840,70 L860,70 L860,55 L880,55 L880,70 L920,70 L920,90 L960,90 L960,65 L980,65 L980,45 L1000,45 L1000,65 L1040,65 L1040,100 L1080,100 L1080,75 L1120,75 L1120,55 L1140,55 L1140,75 L1180,75 L1180,110 L1220,110 L1220,80 L1260,80 L1260,60 L1280,60 L1280,80 L1320,80 L1320,100 L1360,100 L1360,70 L1400,70 L1400,100 L1440,100 L1440,180 Z"/>
        <rect fill="#2a2a3e" x="130" y="110" width="8" height="15" opacity="0.6"/>
        <rect fill="#2a2a3e" x="330" y="60" width="8" height="12" opacity="0.6"/>
        <rect fill="#2a2a3e" x="590" y="50" width="8" height="12" opacity="0.6"/>
        <rect fill="#2a2a3e" x="730" y="50" width="10" height="15" opacity="0.6"/>
        <rect fill="#2a2a3e" x="990" y="55" width="8" height="12" opacity="0.6"/>
        <rect fill="#2a2a3e" x="1130" y="65" width="8" height="12" opacity="0.6"/>
    </svg>

    <div class="content">
        <div class="year-text">2026</div>
        <div class="greeting-text">新年快乐</div>
    </div>

    <div class="hint">点击屏幕放烟花</div>

    <script>
        // ========== 星空背景 ==========
        const starsCanvas = document.getElementById('canvas-stars');
        const starsCtx = starsCanvas.getContext('2d');
        const stars = [];

        function initStars() {
            starsCanvas.width = window.innerWidth;
            starsCanvas.height = window.innerHeight;
            stars.length = 0;
            const starCount = Math.floor((starsCanvas.width * starsCanvas.height) / 8000);
            for (let i = 0; i < starCount; i++) {
                stars.push({
                    x: Math.random() * starsCanvas.width,
                    y: Math.random() * starsCanvas.height * 0.7,
                    radius: Math.max(0.3, Math.random() * 1.5),
                    alpha: Math.random() * 0.8 + 0.2,
                    twinkleSpeed: Math.random() * 0.02 + 0.005,
                    twinklePhase: Math.random() * Math.PI * 2
                });
            }
        }

        function drawStars() {
            starsCtx.clearRect(0, 0, starsCanvas.width, starsCanvas.height);
            const time = Date.now() * 0.001;
            stars.forEach(star => {
                const twinkle = Math.sin(time * star.twinkleSpeed * 10 + star.twinklePhase) * 0.3 + 0.7;
                const alpha = star.alpha * twinkle;
                starsCtx.beginPath();
                starsCtx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                starsCtx.fillStyle = `rgba(255, 255, 240, ${alpha})`;
                starsCtx.fill();
            });
            requestAnimationFrame(drawStars);
        }

        // ========== 烟花系统 ==========
        const canvas = document.getElementById('canvas-fireworks');
        const ctx = canvas.getContext('2d');
        
        const fireworkColors = [
            ['#ffd700', '#ffec8b', '#fff8dc'],
            ['#ff6b4a', '#ff8c69', '#ffa07a'],
            ['#00ced1', '#40e0d0', '#7fffd4'],
            ['#ff69b4', '#ffb6c1', '#ffc0cb'],
            ['#ffffff', '#f0f0f0', '#e8e8e8'],
            ['#87ceeb', '#add8e6', '#b0e0e6']
        ];

        let particles = [];
        let rockets = [];
        let sparks = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Rocket {
            constructor(x, targetY) {
                this.x = x;
                this.y = canvas.height;
                this.targetY = targetY;
                this.speed = Math.random() * 3 + 8;
                this.angle = (Math.random() - 0.5) * 0.3;
                this.trail = [];
                this.colorSet = fireworkColors[Math.floor(Math.random() * fireworkColors.length)];
                this.exploded = false;
            }

            update() {
                if (this.exploded) return true;
                
                this.trail.push({ x: this.x, y: this.y, alpha: 1 });
                if (this.trail.length > 15) this.trail.shift();

                this.x += Math.sin(this.angle) * 2;
                this.y -= this.speed;
                this.speed *= 0.98;

                if (this.y <= this.targetY || this.speed < 2) {
                    this.explode();
                    return true;
                }
                return false;
            }

            draw() {
                this.trail.forEach((point, index) => {
                    const alpha = (index / this.trail.length) * 0.6;
                    const radius = Math.max(0.5, (index / this.trail.length) * 2);
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 200, 100, ${alpha})`;
                    ctx.fill();
                });

                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();
            }

            explode() {
                this.exploded = true;
                const particleCount = Math.floor(Math.random() * 60) + 80;
                
                for (let i = 0; i < particleCount; i++) {
                    const angle = (Math.PI * 2 / particleCount) * i + Math.random() * 0.5;
                    const speed = Math.random() * 6 + 2;
                    const color = this.colorSet[Math.floor(Math.random() * this.colorSet.length)];
                    
                    particles.push(new Particle(
                        this.x,
                        this.y,
                        Math.cos(angle) * speed,
                        Math.sin(angle) * speed,
                        color
                    ));
                }

                for (let i = 0; i < 20; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 2 + 1;
                    sparks.push(new Spark(this.x, this.y, Math.cos(angle) * speed, Math.sin(angle) * speed));
                }
            }
        }

        class Particle {
            constructor(x, y, vx, vy, color) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.color = color;
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.008;
                this.gravity = 0.08;
                this.trail = [];
            }

            update() {
                this.trail.push({ x: this.x, y: this.y, alpha: this.alpha });
                if (this.trail.length > 8) this.trail.shift();

                this.vx *= 0.98;
                this.vy *= 0.98;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;

                return this.alpha <= 0;
            }

            draw() {
                this.trail.forEach((point, index) => {
                    const trailAlpha = (index / this.trail.length) * this.alpha * 0.5;
                    const radius = Math.max(0.5, (index / this.trail.length) * 2);
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, radius, 0, Math.PI * 2);
                    ctx.fillStyle = this.hexToRgba(this.color, trailAlpha);
                    ctx.fill();
                });

                const radius = Math.max(1, 3 * this.alpha);
                ctx.beginPath();
                ctx.arc(this.x, this.y, radius, 0, Math.PI * 2);
                ctx.fillStyle = this.hexToRgba(this.color, this.alpha);
                ctx.fill();
            }

            hexToRgba(hex, alpha) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                return `rgba(${r}, ${g}, ${b}, ${Math.max(0, alpha)})`;
            }
        }

        class Spark {
            constructor(x, y, vx, vy) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.alpha = 1;
                this.decay = Math.random() * 0.03 + 0.02;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.05;
                this.alpha -= this.decay;
                return this.alpha <= 0;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, 1, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 200, ${this.alpha})`;
                ctx.fill();
            }
        }

        function launchFirework(x, targetY) {
            const safeX = Math.max(50, Math.min(canvas.width - 50, x || Math.random() * (canvas.width - 200) + 100));
            const safeTargetY = Math.max(50, Math.min(canvas.height * 0.6, targetY || Math.random() * (canvas.height * 0.4) + canvas.height * 0.1));
            rockets.push(new Rocket(safeX, safeTargetY));
        }

        function autoLaunch() {
            if (Math.random() < 0.03) {
                launchFirework();
            }
            if (Math.random() < 0.01) {
                setTimeout(() => launchFirework(), 200);
                setTimeout(() => launchFirework(), 400);
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 26, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            autoLaunch();

            rockets = rockets.filter(rocket => {
                const done = rocket.update();
                if (!done) rocket.draw();
                return !done;
            });

            particles = particles.filter(particle => {
                const done = particle.update();
                if (!done) particle.draw();
                return !done;
            });

            sparks = sparks.filter(spark => {
                const done = spark.update();
                if (!done) spark.draw();
                return !done;
            });

            requestAnimationFrame(animate);
        }

        // ========== 事件监听 ==========
        window.addEventListener('resize', () => {
            resize();
            initStars();
        });

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            launchFirework(x, y);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            launchFirework(x, y);
        }, { passive: false });

        // ========== 初始化 ==========
        resize();
        initStars();
        drawStars();
        animate();

        // 初始烟花
        setTimeout(() => {
            launchFirework(canvas.width * 0.3);
            launchFirework(canvas.width * 0.5);
            launchFirework(canvas.width * 0.7);
        }, 500);
    </script>
</body>
</html>
