<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日任务</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="plan-container">
<div class="plan-header">
<div class="header-info">
<h1>任务看板</h1>
<p>专注当下，记录每一次成长。</p>
</div>
<div class="header-actions">
<button id="admin-btn" class="btn-primary">
<i class="fa fa-lock"></i> 管理发布
</button>
</div>
</div>

<div class="section-title">
<span class="dot"></span> 今日计划
<span id="today-date"></span>
</div>
<div id="today-container" class="plan-grid">
<div class="loading-placeholder"><i class="fa fa-spinner fa-spin"></i> 加载中...</div>
</div>

<div class="section-title">
<span class="dot gray"></span> 往期回顾
</div>
<div id="past-container" class="timeline-wrapper">
<div id="past-timeline" class="timeline">
<div class="loading-placeholder"><i class="fa fa-spinner fa-spin"></i> 加载中...</div>
</div>
<button id="load-more-btn" class="btn-secondary" style="display:none;">加载更多</button>
</div>
</div>

<div id="auth-modal" class="modal">
<div class="modal-content">
<span class="close-btn">&times;</span>
<div id="auth-view">
<h3><i class="fa fa-shield-alt"></i> 身份验证</h3>
<p style="font-size: 0.9em; color: #666; margin-bottom: 15px;">请输入 GitHub Personal Access Token 进行验证。<br>Token 仅用于本次操作，不会被记录。</p>
<input type="password" id="token-input" placeholder="输入你的 Token..." class="input-field">
<div id="auth-error" style="color: red; font-size: 0.8em; display:none;">Token 验证失败，请检查权限。</div>
<button id="login-btn" class="btn-primary full-width">验证并登录</button>
<a href="https://github.com/settings/tokens/new?description=HexoBlogPlan&scopes=public_repo" target="_blank" class="token-help">如何获取 Token?</a>
</div>

<div id="editor-view" style="display:none;">
<h3><i class="fa fa-edit"></i> 发布新计划</h3>
<input type="text" id="issue-title" placeholder="标题 (例如：今日任务清单)" class="input-field">
<textarea id="issue-body" placeholder="内容 (支持 Markdown 格式)...&#10;- [ ] 任务一&#10;- [ ] 任务二" class="textarea-field"></textarea>
<button id="publish-btn" class="btn-success full-width">
<i class="fa fa-paper-plane"></i> 立即发布
</button>
<div id="publish-status" style="margin-top:10px; text-align:center; display:none;"></div>
</div>
</div>
</div>

<style>
.plan-container { max-width: 900px; margin: 0 auto; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
.plan-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 30px; border-radius: 12px; color: white; box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3); }
.plan-header h1 { margin: 0; font-size: 2em; }
.plan-header p { margin: 5px 0 0 0; opacity: 0.9; }
.btn-primary { background: #fff; color: #667eea; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
.btn-secondary { background: #f0f2f5; color: #444; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 20px; transition: all 0.3s; }
.btn-secondary:hover { background: #e4e6e9; }
.btn-success { background: #28a745; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-size: 1em; font-weight: 600; }
.full-width { width: 100%; }
.section-title { display: flex; align-items: center; font-size: 1.2em; font-weight: 700; color: #333; margin: 40px 0 20px 0; }
.section-title .dot { width: 10px; height: 10px; background: #667eea; border-radius: 50%; margin-right: 10px; }
.section-title .dot.gray { background: #ccc; }
.section-title span { color: #999; font-size: 0.8em; font-weight: 400; margin-left: 10px; }
.plan-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
.today-card { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); border-left: 5px solid #667eea; }
.today-card h3 { margin: 0 0 10px 0; color: #333; }
.today-card .meta { font-size: 0.85em; color: #888; margin-bottom: 15px; display: flex; justify-content: space-between; }
.timeline-wrapper { position: relative; }
.timeline { position: relative; padding-top: 10px; }
.timeline::before { content: ''; position: absolute; left: 15px; top: 0; bottom: 0; width: 2px; background: #e2e8f0; }
.timeline-item { position: relative; padding-left: 45px; margin-bottom: 20px; }
.timeline-marker { position: absolute; left: 9px; top: 5px; width: 12px; height: 12px; background: #fff; border: 2px solid #ccc; border-radius: 50%; z-index: 2; }
.timeline-content { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); padding: 15px; border: 1px solid #eee; }
.timeline-header { display: flex; justify-content: space-between; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; margin-bottom: 8px; font-size: 0.9em; color: #666; }
.timeline-title { font-weight: 600; color: #333; }
.markdown-body ul { list-style: none; padding-left: 0; }
.markdown-body li { margin-bottom: 5px; position: relative; padding-left: 20px; }
.markdown-body li::before { content: '•'; position: absolute; left: 5px; color: #667eea; font-weight: bold; }
.markdown-body input[type="checkbox"] { margin-right: 5px; accent-color: #667eea; }
.modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.5); backdrop-filter: blur(3px); }
.modal-content { background-color: #fff; margin: 10% auto; padding: 30px; border-radius: 10px; width: 90%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); position: relative; }
.close-btn { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; position: absolute; right: 20px; top: 15px; }
.close-btn:hover { color: #333; }
.input-field { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1em; }
.textarea-field { width: 100%; height: 150px; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 0.95em; font-family: monospace; margin-bottom: 15px; resize: vertical; }
.token-help { display: block; text-align: center; margin-top: 15px; font-size: 0.85em; color: #667eea; text-decoration: none; }
@media (max-width: 600px) {
.plan-header { flex-direction: column; text-align: center; }
.header-actions { margin-top: 20px; }
}
</style>

<script>
const CONFIG = {
username: 'Archer314',
repo: 'blog-daily',
label: 'daily',
per_page: 20
};

let currentPage = 1;
let currentToken = ''; 

const todayContainer = document.getElementById('today-container');
const pastContainer = document.getElementById('past-timeline');
const loadMoreBtn = document.getElementById('load-more-btn');
const todayDateEl = document.getElementById('today-date');

const modal = document.getElementById('auth-modal');
const adminBtn = document.getElementById('admin-btn');
const closeBtn = document.querySelector('.close-btn');
const authView = document.getElementById('auth-view');
const editorView = document.getElementById('editor-view');

const getTodayStr = () => new Date().toLocaleDateString('zh-CN');
const isToday = (dateStr) => new Date(dateStr).toLocaleDateString('zh-CN') === getTodayStr();

todayDateEl.innerText = getTodayStr();
fetchIssues();

function fetchIssues(page = 1) {
const url = `https://api.github.com/repos/${CONFIG.username}/${CONFIG.repo}/issues?labels=${CONFIG.label}&state=all&sort=created&direction=desc&page=${page}&per_page=${CONFIG.per_page}`;

fetch(url)
.then(res => res.json())
.then(data => {
if (data.message) throw new Error(data.message);

if (page === 1) {
todayContainer.innerHTML = '';
pastContainer.innerHTML = '';
}

let hasToday = false;

data.forEach(issue => {
const html = createIssueHTML(issue);
if (isToday(issue.created_at)) {
todayContainer.innerHTML += html;
hasToday = true;
} else {
pastContainer.innerHTML += createPastHTML(issue);
}
});

if (!hasToday && page === 1) {
todayContainer.innerHTML = '<div class="empty-state">今天还没有计划，快去添加吧！</div>';
}

if (data.length === CONFIG.per_page) {
loadMoreBtn.style.display = 'block';
loadMoreBtn.onclick = () => {
currentPage++;
fetchIssues(currentPage);
};
} else {
loadMoreBtn.style.display = 'none';
}
})
.catch(err => {
console.error(err);
todayContainer.innerHTML = '<div class="error-state">加载失败，请检查配置或网络</div>';
});
}

function createIssueHTML(issue) {
const body = marked.parse(issue.body || '');
return `
<div class="today-card">
<div class="meta">
<span>发布于 ${new Date(issue.created_at).toLocaleTimeString('zh-CN', {hour: '2-digit', minute:'2-digit'})}</span>
</div>
<h3>${issue.title}</h3>
<div class="markdown-body">${body}</div>
</div>
`;
}

function createPastHTML(issue) {
const body = marked.parse(issue.body || '');
const date = new Date(issue.created_at).toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
return `
<div class="timeline-item">
<div class="timeline-marker"></div>
<div class="timeline-content">
<div class="timeline-header">
<span class="timeline-title">${issue.title}</span>
<span>${date}</span>
</div>
<div class="markdown-body">${body}</div>
</div>
</div>
`;
}

adminBtn.onclick = () => {
modal.style.display = 'block';
authView.style.display = 'block';
editorView.style.display = 'none';
}

closeBtn.onclick = () => modal.style.display = 'none';
window.onclick = (e) => { if (e.target == modal) modal.style.display = 'none'; }

document.getElementById('login-btn').onclick = () => {
const token = document.getElementById('token-input').value;
const errorEl = document.getElementById('auth-error');
const btn = document.getElementById('login-btn');

if (!token) {
errorEl.innerText = '请输入 Token！';
errorEl.style.display = 'block';
return;
}

btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> 验证中...';
btn.disabled = true;
errorEl.style.display = 'none';

fetch('https://api.github.com/user', {
headers: { Authorization: `token ${token}` }
})
.then(res => {
if (res.ok) return res.json();
return res.json().then(err => { throw new Error(err.message || 'Token无效') });
})
.then(user => {
if (user.login.toLowerCase() === CONFIG.username.toLowerCase()) {
currentToken = token;
authView.style.display = 'none';
editorView.style.display = 'block';
document.getElementById('issue-title').value = `每日计划 - ${getTodayStr()}`;
} else {
throw new Error(`身份不符！Token 所属用户: ${user.login}，配置用户: ${CONFIG.username}`);
}
})
.catch(err => {
errorEl.innerText = `验证失败: ${err.message}`;
errorEl.style.display = 'block';
})
.finally(() => {
btn.innerHTML = '验证并登录';
btn.disabled = false;
});
};

document.getElementById('publish-btn').onclick = async () => {
const titleEl = document.getElementById('issue-title');
const bodyEl = document.getElementById('issue-body');
const statusEl = document.getElementById('publish-status');
const publishBtn = document.getElementById('publish-btn');

const title = titleEl.value.trim();
const body = bodyEl.value.trim();

if (!title) {
statusEl.innerHTML = '<span style="color:red">请填写标题！</span>';
statusEl.style.display = 'block';
titleEl.focus();
return;
}

if (!body) {
statusEl.innerHTML = '<span style="color:red">请填写内容！</span>';
statusEl.style.display = 'block';
bodyEl.focus();
return;
}

publishBtn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> 发布中...';
publishBtn.disabled = true;
statusEl.innerHTML = '<i class="fa fa-spinner fa-spin"></i> 正在连接 GitHub...';
statusEl.style.display = 'block';

try {
const response = await fetch(`https://api.github.com/repos/${CONFIG.username}/${CONFIG.repo}/issues`, {
method: 'POST',
headers: {
'Authorization': `token ${currentToken}`,
'Accept': 'application/vnd.github.v3+json',
'Content-Type': 'application/json'
},
body: JSON.stringify({
title: title,
body: body,
labels: [CONFIG.label]
})
});

const data = await response.json();

if (response.ok && data.id) {
statusEl.innerHTML = '<span style="color:green"><i class="fa fa-check-circle"></i> 发布成功！页面即将刷新...</span>';

titleEl.value = '';
bodyEl.value = '';

setTimeout(() => {
modal.style.display = 'none';
location.reload();
}, 1500);
} else {
throw new Error(data.message || '发布失败，请检查 Token 权限');
}
} catch (error) {
console.error('发布错误:', error);
let errorMsg = '发布失败: ';
if (error.message.includes('Failed to fetch')) {
errorMsg += '网络连接失败，请检查网络';
} else if (error.message.includes('401')) {
errorMsg += 'Token 无效或已过期';
} else if (error.message.includes('403')) {
errorMsg += '权限不足，请确保 Token 有 public_repo 权限';
} else if (error.message.includes('404')) {
errorMsg += '仓库不存在，请检查用户名/仓库名';
} else {
errorMsg += error.message;
}
statusEl.innerHTML = `<span style="color:red"><i class="fa fa-exclamation-triangle"></i> ${errorMsg}</span>`;
} finally {
publishBtn.innerHTML = '<i class="fa fa-paper-plane"></i> 立即发布';
publishBtn.disabled = false;
}
};
</script>
</body>
</html>
